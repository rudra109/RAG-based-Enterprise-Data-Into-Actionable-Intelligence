global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics

  - job_name: "rag-service"
    static_configs:
      - targets: ["rag-service:8001"]
    metrics_path: /metrics

  - job_name: "anomaly-service"
    static_configs:
      - targets: ["anomaly-service:8002"]
    metrics_path: /metrics

  - job_name: "forecast-service"
    static_configs:
      - targets: ["forecast-service:8003"]
    metrics_path: /metrics

  - job_name: "agent-service"
    static_configs:
      - targets: ["agent-service:8004"]
    metrics_path: /metrics

  - job_name: "kg-service"
    static_configs:
      - targets: ["kg-service:8005"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
