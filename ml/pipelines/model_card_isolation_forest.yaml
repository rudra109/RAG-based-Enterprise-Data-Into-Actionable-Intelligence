# EnterpriseIQ Isolation Forest — Model Card
# MLOps documentation per Month 10-12 requirements

model_details:
  name: "EnterpriseIQ Anomaly Detection — Isolation Forest v1"
  version: "1.0.0"
  type: "Anomaly Detection (Unsupervised)"
  framework: "scikit-learn 1.5.0"
  deployment: "Vertex AI Endpoint"
  owner: "Developer B — ML & AI Engineer"
  last_updated: "2026-05-12"
  registry: "Vertex AI Model Registry / enterpriseiq-models"

intended_use:
  primary_use_case: >
    Detect anomalies in multivariate enterprise time-series data.
    Designed to flag unusual patterns in financial metrics, operational KPIs,
    and sensor data for downstream alerting and root cause analysis.
  
  supported_data_types:
    - Numerical time-series (financial, operational)
    - Multivariate sensor readings
    - Business KPI streams (revenue, orders, latency)
  
  out_of_scope:
    - Text/document anomaly detection (use semantic_anomaly_detection instead)
    - Image or video anomaly detection
    - Datasets with fewer than 50 records
    - Real-time streaming (use statistical_detection for sub-second latency)

training_data:
  source: "BigQuery: enterpriseiq_core.anomaly_training_data"
  period: "January 2024 – April 2026"
  size: "~500,000 records"
  labelling: "Mix of human-labelled and system-generated (3:7 ratio)"
  features:
    - value (primary metric)
    - rolling_mean_7d
    - rolling_std_7d
    - hour_of_day
    - day_of_week
  contamination: 0.05  # 5% assumed anomaly rate

model_architecture:
  algorithm: Isolation Forest
  n_estimators: 200
  contamination: 0.05
  max_features: 1.0
  random_state: 42
  ensemble_strategy: >
    Combined with Z-score/IQR (statistical) and Gemini semantic detection.
    Final anomaly score uses ensemble voting with score averaging for
    consensus anomalies.

evaluation:
  test_set_size: 10_000
  labelled_by: "Domain experts + synthetic injection"
  
  metrics:
    precision: 0.92
    recall: 0.87
    f1_score: 0.89
    false_positive_rate: 0.08
    
  targets_from_roadmap:
    precision_target: "> 90%"
    recall_target: "> 85%"
    status: "✅ BOTH TARGETS MET"

  ragas_metrics: "N/A — not applicable to anomaly detection"
  
  evaluation_datasets:
    - name: "Financial KPI Golden Set"
      size: 5000
      precision: 0.94
      recall: 0.88
    - name: "Operational Metrics Golden Set"
      size: 5000
      precision: 0.91
      recall: 0.86

performance:
  inference_latency_p50: "12ms"
  inference_latency_p99: "45ms"
  throughput: "5,000 records/second on n1-standard-4"
  memory_usage: "~800MB per replica"
  
  vertex_ai_endpoint:
    machine_type: "n1-standard-4"
    min_replicas: 1
    max_replicas: 3
    autoscaling_metric: "CPU utilization > 60%"

limitations_and_risks:
  known_limitations:
    - >
      Performance degrades on highly seasonal data without proper feature engineering.
      Use Prophet-based anomaly detection as fallback for strongly seasonal metrics.
    - >
      Isolation Forest assumes contamination rate is known a priori. If the actual
      anomaly rate differs significantly from 5%, re-train with correct contamination.
    - >
      Multivariate features must all be numerical. Encode categorical features before
      passing to this model.
  
  bias_and_fairness:
    - >
      The model was trained on internal enterprise data and may not generalise
      to datasets with very different distributions without retraining.
    - >
      Anomaly scores are relative to the training distribution — a score of 0.7
      in one dataset context may mean something different in another.
  
  false_positive_guidance: >
    A false positive rate of 8% means that approximately 1 in 12 flagged anomalies
    may be a normal data point. Always review critical anomalies manually before
    taking automated action. Use the Gemini semantic detector for secondary validation
    on critical (severity="critical") anomalies.

drift_monitoring:
  method: "Population Stability Index (PSI) + KL Divergence"
  retraining_trigger: "PSI > 0.25 on any key feature"
  monitoring_frequency: "Daily via Cloud Composer DAG (enterpriseiq_mlops_daily)"
  model_registry_versioning: "Vertex AI Model Registry — semantic versioning"

responsible_ai:
  explainability: >
    Anomaly explanations generated by Gemini Flash (semantic_anomaly_detection)
    provide human-readable reasons for flagged anomalies.
    Root cause analysis via ModelDriftDetector.explain_anomaly_root_cause().
  
  human_oversight: >
    All critical anomalies (severity=critical) require manual acknowledgement via
    the EnterpriseIQ dashboard before automated downstream actions are triggered.
  
  auditability: >
    All anomaly detections are logged to BigQuery (anomaly_results table) with
    full provenance: dataset_id, detection method, score, timestamp, and model version.

changelog:
  - version: "1.0.0"
    date: "2026-05-12"
    changes:
      - Initial production release
      - Ensemble of Statistical + Isolation Forest + Gemini Semantic
      - Vertex AI endpoint deployment
      - Drift monitoring via Composer DAG
